<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Login Form</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    min-height:100vh;
    background:#081421;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
}

h1{
    color:white;
    margin-bottom:30px;
    font-size:50px;
}

h1 span{
    color:#9cff57;
}

.container{
    width:700px;
    height:400px;
    background:#e89c68;
    border:3px solid #fff;
    position:relative;
    overflow:hidden;
}

/* Walking Character */
.character{
    position:absolute;
    bottom:50px;
    left:-100px;
    width:80px;
    animation:walk 8s linear infinite;
}

.character img{
    width:100%;
}

@keyframes walk{
    0%{
        left:-100px;
    }
    100%{
        left:800px;
    }
}

/* Login Form */
.login-box{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:300px;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 10px 20px rgba(0,0,0,0.2);
    opacity:0;
    animation:showForm 8s linear infinite;
}

@keyframes showForm{
    0%,45%{
        opacity:0;
    }
    55%,100%{
        opacity:1;
    }
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

.login-box input{
    width:100%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

.login-box button{
    width:100%;
    padding:10px;
    background:#4CAF50;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>
<body>

<h1><span>Login Form</span> Animation</h1>

<div class="container">

    <div class="character">
        <!-- Replace with your emoji/man image -->
        <img src="https://cdn-icons-png.flaticon.com/512/4140/4140048.png" alt="">
    </div>

    <div class="login-box">
        <h2>Login</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button>Login</button>
    </div>

</div>

</body>
</html>
